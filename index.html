<style>

/* ── TOP BAR ── */
#top-bar{position:absolute;top:0;left:0;right:0;height:64px;background:#0d0d1a;border-bottom:2px solid #c9a84c;display:flex;align-items:center;padding:0 16px;z-index:10;}
#clp-logo{display:flex;align-items:center;gap:8px;flex-shrink:0;}
#tbi{display:flex;align-items:center;justify-content:center;gap:10px;font-size:17px;font-weight:700;color:#fff;letter-spacing:.5px;position:absolute;left:0;right:0;top:0;bottom:0;pointer-events:none;}
#tbi .dot{color:#c9a84c;font-size:20px;}
#tbi .stakes{color:#c9a84c;}
#tbi .dec{color:#fff;font-weight:400;font-size:15px;letter-spacing:1px;}
#ts{color:#888;font-size:13px;flex-shrink:0;position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:11;}

/* ── PROGRESS SLIDER ── */
#progress-wrapper{position:absolute;bottom:58px;left:0;right:0;height:20px;cursor:pointer;z-index:20;display:flex;align-items:center;}

#bottom-text{font-style:italic;color:#e8e8e8;font-size:14px;line-height:1.4;flex:1;padding-right:16px;}
#nav{display:flex;align-items:center;gap:10px;flex-shrink:0;}
#nav button{background:#222;color:#fff;border:1px solid #555;padding:6px 16px;border-radius:4px;font-size:13px;cursor:pointer;}

.speed-opt:hover{background:#444;}
.speed-opt.active{color:#c9a84c;font-weight:700;}

/* ── HAND SLIDE LAYOUT ── */
#action-zone{position:absolute;top:64px;right:0;width:355px;bottom:68px;background:rgba(8,8,18,.88);border-left:1px solid #333;padding:10px;overflow-y:hidden;z-index:5;display:flex;flex-direction:column;gap:8px;}

.ab .sl{font-size:12px;font-weight:800;color:#c9a84c;letter-spacing:1.5px;margin-bottom:4px;text-transform:uppercase;}

#table-zone{position:absolute;top:64px;left:0;right:355px;bottom:68px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#tsv{width:100%;height:100%;overflow:visible;}

/* ── CONCEPT SLIDE LAYOUT ── */
#concept-zone{position:absolute;top:64px;left:0;right:0;bottom:68px;padding:28px 72px;display:none;flex-direction:column;justify-content:center;}

#concept-zone ul{list-style:none;display:flex;flex-direction:column;gap:18px;}

#concept-zone .insight-box{margin-top:24px;padding:16px 20px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);border-radius:6px;font-size:1.2rem;color:#e8e8e8;line-height:1.55;font-style:italic;}
#concept-zone .result-row{margin-top:10px;padding:12px 16px;background:rgba(255,255,255,.04);border-left:3px solid #c9a84c;border-radius:3px;font-size:1.15rem;color:#e8e8e8;line-height:1.5;}

.card-inline{display:inline-flex;align-items:center;justify-content:center;background:#fff;border-radius:3px;padding:1px 5px;font-size:.9em;font-weight:700;line-height:1;margin:0 1px;vertical-align:middle;border:1px solid #ccc;min-width:24px;}
.card-inline.h{color:#d42020;}

/* ── TITLE SLIDE ── */
#title-zone{position:absolute;top:64px;left:0;right:0;bottom:68px;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px;}
#title-zone h1{font-size:3.2rem;font-weight:900;color:#fff;line-height:1.1;letter-spacing:1px;}
#title-zone .subtitle{margin-top:18px;font-size:1.1rem;color:#aaa;}
#title-zone .subtitle.big{font-size:2.2rem;line-height:1.25;}
#title-zone .host{margin-top:14px;font-size:1.9rem;color:#c9a84c;font-weight:700;letter-spacing:1px;}
</style>

<script>
// ── SCALE ──
function scaleCanvas(){
  const c=document.getElementById('slide-canvas'),w=document.getElementById('scaler-wrapper');
  c.style.transform=`scale(${Math.min(w.clientWidth/1280,w.clientHeight/720)})`;
}
window.addEventListener('resize',scaleCanvas);scaleCanvas();

// ── GEOMETRY ──
const CX=460,CY=283,RX=292,RY=176,ORAX=342,ORAY=224;
function seatPos(deg){
  const r=deg*Math.PI/180;
  return{x:CX-ORAX*Math.sin(r), y:CY+ORAY*Math.cos(r)};
}

// ── SEATS ──
const SEATS={
  hero:{angle:0,   label:'Hero',  stack:1300, empty:false, heroPos:'BB'},
  sb:  {angle:320, label:'SB',    stack:595,  empty:false},
  btn: {angle:280, label:'BTN',   stack:595,  empty:false},
  co:  {angle:240, label:'CO',    stack:595,  empty:false},
  hj:  {angle:200, label:'HJ',    stack:595,  empty:false},
  lj:  {angle:160, label:'LJ',    stack:595,  empty:false},
  mp:  {angle:120, label:'MP',    stack:57,   empty:false},
  utg1:{angle:80,  label:'UTG+1', stack:0,    empty:true},
  utg2:{angle:40,  label:'UTG+2', stack:0,    empty:true},
};

// ── CANONICAL SEAT DERIVATION ──
// Real poker action order, cyclic. Physical slots are read in table-clockwise
// order starting at Hero (increasing angle: hero,utg2,utg1,mp,lj,hj,co,btn,sb).
// Given Hero's canonical position, walk forward through ACTION_ORDER once per
// physical slot in that order. This derives who canonically sits where instead
// of hardcoding it — works for any Hero position, not just BB.
const ACTION_ORDER=['UTG','UTG+1','UTG+2','LJ','HJ','CO','BTN','SB','BB'];
const CLOCKWISE_SLOTS=['hero','utg2','utg1','mp','lj','hj','co','btn','sb'];
function deriveSeatCanon(heroPos){
  const startIdx=ACTION_ORDER.indexOf(heroPos||'BB');
  const map={};
  CLOCKWISE_SLOTS.forEach((slotKey,i)=>{map[slotKey]=ACTION_ORDER[(startIdx+i)%9];});
  return map;
}

// ── CARDS ──
const SC={h:'#d42020',d:'#1a5fd4',c:'#1a8c1a',s:'#111','?':'#000'};
const SS={h:'♥',d:'♦',c:'♣',s:'♠','?':'?'};
function pc(code){return{rank:code.slice(0,-1).toUpperCase(),suit:code.slice(-1).toLowerCase()};}
function cFaceUp(x,y,w,h,code){
  const{rank,suit}=pc(code),col=SC[suit],sym=SS[suit];
  const rFs=w*0.38,symFs=w*0.65,margin=3.5,qOff=3;
  const topY=y+margin+rFs*0.85,botY=y+h-margin,symCY=y+h/2+(sym==='?'?qOff:0);
  return`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="#fff" stroke="#ccc" stroke-width="1"/>
<text x="${x+margin}" y="${topY}" font-size="${rFs}" fill="${col}" font-weight="800" font-family="Arial">${rank}</text>
<text x="${x+w/2}" y="${symCY}" text-anchor="middle" dominant-baseline="middle" font-size="${symFs}" fill="${col}" font-family="Arial"${sym==='?'?' font-weight="800"':''}>${sym}</text>
<text x="${x+w-margin}" y="${botY}" font-size="${rFs}" fill="${col}" font-weight="800" font-family="Arial" text-anchor="end">${rank}</text>`;
}
function cFaceDown(x,y,w,h){
  const id=`cb${Math.round(x)}_${Math.round(y)}`;
  return`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="#fff" stroke="#aaa" stroke-width="1"/>
<clipPath id="${id}"><rect x="${x+2}" y="${y+2}" width="${w-4}" height="${h-4}" rx="3"/></clipPath>
<rect x="${x+2}" y="${y+2}" width="${w-4}" height="${h-4}" fill="url(#cbp)" clip-path="url(#${id})"/>`;
}
function cUnknown(x,y,w,h){
  return`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="#fff" stroke="#c9a84c" stroke-width="1.5"/>
<text x="${x+w/2}" y="${y+h/2+3}" text-anchor="middle" dominant-baseline="middle" font-size="${w*0.68}" fill="#000" font-weight="900" font-family="Arial">?</text>`;
}
const HC=['Qd','Th','9d','7s'],BW=43,BH=61,SW=34,SH=49,CG=3;
function heroRow(cx,ty,cards){
  const c=cards||HC,tw=4*BW+3*CG;
  return c.map((cd,i)=>cFaceUp(cx-tw/2+i*(BW+CG),ty,BW,BH,cd)).join('');
}
function fdRow(cx,ty,n,cw,ch){
  const tw=n*cw+(n-1)*CG;
  return Array.from({length:n},(_,i)=>cFaceDown(cx-tw/2+i*(cw+CG),ty,cw,ch)).join('');
}
function revRow(cx,ty,cards,cw,ch){
  const tw=cards.length*cw+(cards.length-1)*CG;
  return cards.map((c,i)=>{
    const x=cx-tw/2+i*(cw+CG);
    if(c===null) return cFaceDown(x,ty,cw,ch);
    if(c==='?')  return cUnknown(x,ty,cw,ch);
    return cFaceUp(x,ty,cw,ch,c);
  }).join('');
}
function boardRow(cx,cy,cards){
  const tw=5*BW+4*CG;
  return Array.from({length:5},(_,i)=>{
    const x=cx-tw/2+i*(BW+CG),ty=cy-BH/2;
    return i<cards.length?cFaceUp(x,ty,BW,BH,cards[i])
      :`<rect x="${x}" y="${ty}" width="${BW}" height="${BH}" rx="4" fill="#1a5e32" stroke="#2d8a4e" stroke-width="1" opacity=".4"/>`;
  }).join('');
}

// ── CHIPS ──
function drawPotChips(cx,cy,amt){
  if(!amt||amt<=0) return'';
  const denoms=[
    {val:1000,col:'#d4b800',dark:'#8a7700',tc:'#000'},
    {val:500, col:'#6a0dad',dark:'#3d0069',tc:'#fff'},
    {val:100, col:'#1a1a1a',dark:'#000',   tc:'#fff'},
    {val:25,  col:'#2d7a2d',dark:'#1a4d1a',tc:'#fff'},
    {val:5,   col:'#c0392b',dark:'#7b1f1a',tc:'#fff'},
    {val:1,   col:'#dcdcdc',dark:'#999',   tc:'#333'}
  ];
  const chips=[];let rem=amt;
  for(const d of denoms){if(rem>=d.val){const n=Math.floor(rem/d.val);rem-=n*d.val;chips.push({...d,n});}}
  if(!chips.length) return'';
  const cr=11,crescentW=7,groupGap=1;
  const totalW=chips.reduce((s,c,i)=>s+(cr*2)+(c.n>1?(c.n-1)*crescentW:0)+(i<chips.length-1?groupGap:0),0);
  let out='',drawX=cx-totalW/2;
  chips.forEach(c=>{
    const stackExt=(c.n-1)*crescentW,chipCX=drawX+stackExt+cr;
    for(let i=c.n-1;i>=1;i--){
      const cx2=chipCX-i*crescentW;
      out+=`<circle cx="${cx2}" cy="${cy}" r="${cr}" fill="${c.col}" stroke="${c.dark}" stroke-width="1.5"/>`;
      out+=`<circle cx="${cx2}" cy="${cy}" r="${cr*0.65}" fill="none" stroke="${c.tc}" stroke-width="0.8" opacity="0.35"/>`;
    }
    out+=`<circle cx="${chipCX}" cy="${cy}" r="${cr}" fill="${c.col}" stroke="${c.dark}" stroke-width="1.5"/>`;
    out+=`<circle cx="${chipCX}" cy="${cy}" r="${cr*0.65}" fill="none" stroke="${c.tc}" stroke-width="0.9" opacity="0.5"/>`;
    out+=`<circle cx="${chipCX}" cy="${cy-3}" r="${cr*0.55}" fill="none" stroke="${c.tc}" stroke-width="0.6" opacity="0.2"/>`;
    drawX=chipCX+cr+groupGap;
  });
  return out;
}

// ── SIDE-POT BADGE ROW ──
// Renders 2+ pot badges horizontally, centered, in the gap between the
// upper seats (CO/HJ/LJ card-bottom ~y196) and the board (top edge ~y237.5).
// Only used when a slide has a genuine side-pot situation (slide.pots.length>=2);
// single-pot slides keep the plain "Pot: $X" counter untouched.
const POT_BADGE_Y=214;
function renderPotBadges(pots){
  const padX=10,h=22,gap=8,fs=12;
  const texts=pots.map(p=>`${p.label}: $${p.amount}`);
  const widths=texts.map(t=>Math.max(70,t.length*6.5+2*padX));
  const totalW=widths.reduce((a,b)=>a+b,0)+gap*(pots.length-1);
  let x=CX-totalW/2;
  let out='';
  texts.forEach((t,i)=>{
    const w=widths[i];
    out+=`<rect x="${x}" y="${POT_BADGE_Y-h/2}" width="${w}" height="${h}" rx="${h/2}" fill="#111" opacity=".85"/>
<text x="${x+w/2}" y="${POT_BADGE_Y+4}" text-anchor="middle" font-size="${fs}" fill="#fff" font-weight="700" font-family="Arial">${t}</text>`;
    x+=w+gap;
  });
  return out;
}
function drawPlayerChips(cx,cy,amt){
  if(!amt||amt<=0) return'';
  const denoms=[
    {val:1000,col:'#d4b800',dark:'#8a7700',tc:'#000'},
    {val:500, col:'#6a0dad',dark:'#3d0069',tc:'#fff'},
    {val:100, col:'#1a1a1a',dark:'#000',   tc:'#fff'},
    {val:25,  col:'#2d7a2d',dark:'#1a4d1a',tc:'#fff'},
    {val:5,   col:'#c0392b',dark:'#7b1f1a',tc:'#fff'},
    {val:1,   col:'#dcdcdc',dark:'#999',   tc:'#333'}
  ];
  const groups=[];let rem=amt;
  for(const d of denoms){if(rem>=d.val){const n=Math.floor(rem/d.val);rem-=n*d.val;groups.push({...d,n});}}
  if(!groups.length) return'';
  const cr=10,cw=6;
  const crescents=[];
  groups.forEach((g,i)=>{const count=i===0?g.n-1:g.n;for(let j=0;j<count;j++) crescents.push(g);});
  const out=[];
  out.push(`<text x="${cx}" y="${cy-cr-8}" text-anchor="middle" font-size="14" fill="#fff" font-weight="700" font-family="Arial">$${amt}</text>`);
  crescents.slice().reverse().forEach((g,ri)=>{
    const pos=crescents.length-ri,x=cx-pos*cw;
    out.push(`<circle cx="${x}" cy="${cy}" r="${cr}" fill="${g.col}" stroke="${g.dark}" stroke-width="1.5"/>`);
    out.push(`<circle cx="${x}" cy="${cy}" r="${cr*0.65}" fill="none" stroke="${g.tc}" stroke-width="0.8" opacity="0.3"/>`);
  });
  const fg=groups[0];
  out.push(`<circle cx="${cx}" cy="${cy}" r="${cr}" fill="${fg.col}" stroke="${fg.dark}" stroke-width="1.5"/>`);
  out.push(`<circle cx="${cx}" cy="${cy}" r="${cr*0.65}" fill="none" stroke="${fg.tc}" stroke-width="0.9" opacity="0.5"/>`);
  out.push(`<circle cx="${cx}" cy="${cy-3}" r="${cr*0.55}" fill="none" stroke="${fg.tc}" stroke-width="0.6" opacity="0.2"/>`);
  return out.join('');
}

// ── NAMEPLATE ──
function isSeatEmpty(key,seatDef,slide){
  if(slide&&slide.activeSeats&&slide.activeSeats.includes(key)) return false;
  const forcedEmpty=slide&&slide.emptySeats&&slide.emptySeats.includes(key);
  return seatDef.empty||forcedEmpty;
}
function npLabel(key,seatDef,slide){
  const heroPos=(slide&&slide.heroPos)||seatDef.heroPos||'BB';
  if(key==='hero'){
    if(['BB','SB','BTN'].includes(heroPos)) return'Hero';
    return`Hero-${heroPos}`;
  }
  const canon=deriveSeatCanon(heroPos)[key];
  if(isSeatEmpty(key,seatDef,slide)) return canon;
  if(slide&&slide.seatLabels&&slide.seatLabels[key]) return slide.seatLabels[key];
  return canon;
}
function drawNP(cx,cy,lbl,stack,folded,badge,allIn,empty,isTopHalf){
  if(empty){
    const w=70,h=28,x=cx-w/2,y=cy-h/2;
    return`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="#1a1a2e" stroke="#333" stroke-width="1" opacity=".5"/>
<text x="${cx}" y="${y+17}" text-anchor="middle" font-size="11" fill="#444" font-family="Arial">${lbl}</text>`;
  }
  const op=folded?.3:1;
  const w=82,h=36,x=cx-w/2,y=cy-h/2;
  const bg=allIn?'#2a1500':'#0d1a0d';
  let bc='#444';
  if(badge==='All-In') bc='#c9a84c';
  else if(badge==='Fold') bc='#2a2a2a';
  else if(badge==='Wins') bc='#1a6a1a';
  else if(badge==='?') bc='#c9a84c';
  else if(badge) bc='#2a2a2a';
  let out=`<g opacity="${op}">
<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="5" fill="${bg}" stroke="#c9a84c" stroke-width="1.3"/>
<text x="${cx}" y="${y+14}" text-anchor="middle" font-size="13" fill="#fff" font-weight="700" font-family="Arial">${lbl}</text>
<text x="${cx}" y="${y+30}" text-anchor="middle" font-size="12" fill="#c9a84c" font-weight="700" font-family="Arial">$${stack}</text>`;
  if(badge){
    const bw=Math.max(52,badge.length*7+16);
    const bx=(x+w-8)+bw/2;
    const by=isTopHalf?y+5:y+h-5;
    const badgeBorder=(badge==='All-In')?'#e74c3c':'#c9a84c';
    const badgeBorderW=(badge==='All-In')?2:1;
    out+=`<rect x="${bx-bw/2}" y="${by-10}" width="${bw}" height="19" rx="9.5" fill="${bc}" stroke="${badgeBorder}" stroke-width="${badgeBorderW}" opacity=".93"/>
<text x="${bx}" y="${by+4}" text-anchor="middle" font-size="11" fill="#fff" font-weight="800" font-family="Arial">${badge}</text>`;
  }
  out+=`</g>`;
  return out;
}

// ── POSITION BUTTONS ──
// Button angles are derived per-slide from canonical position (see
// deriveSeatCanon/findSlotAngle) — never hardcoded, since Hero isn't always BB.
function findSlotAngle(canonPos,heroPos){
  const map=deriveSeatCanon(heroPos);
  for(const k in map){ if(map[k]===canonPos) return SEATS[k].angle; }
  return 0;
}
function posBtns(btnDeg,sbDeg,bbDeg){
  function drawBtn(deg,lbl,col,offsetX){
    const r=deg*Math.PI/180,bx=CX-RX*Math.sin(r)*0.88+(offsetX||0),by=CY+RY*Math.cos(r)*0.88;
    return`<circle cx="${bx}" cy="${by}" r="11" fill="${col}" stroke="#fff" stroke-width="1.2"/>
<text x="${bx}" y="${by+4}" text-anchor="middle" font-size="9" fill="#fff" font-weight="900" font-family="Arial">${lbl}</text>`;
  }
  // +23px nudge is a Hand-2-specific hack (clears hero's 9♦ card) — only valid
  // when BB happens to sit at Hero's own seat (angle 0). Never apply it otherwise.
  const bbOffset=(bbDeg===0)?23:0;
  return drawBtn(btnDeg,'D','#333')+drawBtn(sbDeg,'SB','#1a7a1a')+drawBtn(bbDeg,'BB','#1a3acc',bbOffset);
}

// ── SEAT RENDER ──
function renderSeat(key,seatDef,ps,slide){
  if(!ps) return'';
  const{x:sx,y:sy}=seatPos(seatDef.angle);
  const ang=seatDef.angle,folded=ps.folded,badge=ps.badge,allIn=ps.allIn;
  const empty=isSeatEmpty(key,seatDef,slide);
  const lbl=npLabel(key,seatDef,slide),stack=ps.stack;
  const cw=(key==='hero')?BW:SW,ch=(key==='hero')?BH:SH;
  const isTopHalf=sy<CY-20;
  let npCX,npCY,cardCX,cardTY;
  if(ang===0){cardCX=sx;cardTY=sy-ch+13;npCX=sx;npCY=cardTY+ch+26;}
  else if(isTopHalf){cardCX=sx;cardTY=sy-ch/2;npCX=sx;npCY=cardTY-26;}
  else{cardCX=sx;cardTY=sy-ch/2;npCX=sx;npCY=cardTY+ch+22;}
  let out='';
  if(empty){out+=drawNP(npCX,npCY,lbl,0,false,null,false,true,isTopHalf);return out;}
  const revealed=ps.revealedCards,op=folded?.3:1;
  out+=`<g opacity="${op}">`;
  if(key==='hero') out+=heroRow(cardCX,cardTY,ps.heroCards);
  else if(revealed) out+=revRow(cardCX,cardTY,revealed,BW,BH);
  else out+=fdRow(cardCX,cardTY,4,SW,SH);
  out+=`</g>`;
  out+=drawNP(npCX,npCY,lbl,stack,folded,badge,allIn,false,isTopHalf);
  const chipAmt=ps.chipBet||0;
  if(chipAmt>0&&!folded){
    const cr=ang*Math.PI/180,chipDist=0.62;
    const chipX=CX-ORAX*chipDist*Math.sin(cr),chipY=CY+ORAY*chipDist*Math.cos(cr);
    out+=drawPlayerChips(chipX,chipY,chipAmt);
  }
  return out;
}

// ── STATE ──
let cur=0;
let autoMode=false;
const EPISODE_DURATION=2700; // fallback if audio metadata not loaded

// ── AUDIO ──
const aud=document.getElementById('aud');
const tsEl=document.getElementById('ts');
const playBtn=document.getElementById('play-btn');
const progressFill=document.getElementById('progress-fill');
const progressHandle=document.getElementById('progress-handle');
const progressBar=document.getElementById('progress-wrapper');

function updateProgressBar(){
  const dur=aud.duration||EPISODE_DURATION;
  const pct=Math.min((aud.currentTime/dur)*100,100);
  progressFill.style.width=pct+'%';
  progressHandle.style.left=pct+'%';
}

aud.addEventListener('timeupdate',()=>{
  const t=aud.currentTime;
  const m=Math.floor(t/60);
  const s=Math.floor(t%60).toString().padStart(2,'0');
  tsEl.textContent=`${m}:${s}`;
  updateProgressBar();
  if(!autoMode) return;
  let target=0;
  for(let i=0;i<slides.length;i++){if(t>=slides[i].time) target=i;}
  if(target!==cur){cur=target;render(cur);}
});
aud.addEventListener('play', ()=>{autoMode=true; playBtn.textContent='⏸ Pause';});
aud.addEventListener('pause',()=>{autoMode=false;playBtn.textContent='▶ Play';});
aud.addEventListener('ended',()=>{autoMode=false;playBtn.textContent='▶ Play';});

function togglePlay(){
  if(aud.paused) aud.play();
  else aud.pause();
}

// ── PROGRESS BAR SCRUBBING ──
let scrubbing=false;

function scrubTo(e){
  const track=document.getElementById('progress-track');
  const rect=track.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  const dur=aud.duration||EPISODE_DURATION;
  const targetTime=pct*dur;
  aud.currentTime=targetTime;
  let target=0;
  for(let i=0;i<slides.length;i++){if(targetTime>=slides[i].time) target=i;}
  if(target!==cur){cur=target;render(cur);}
  updateProgressBar();
}

progressBar.addEventListener('mousedown',(e)=>{e.preventDefault();scrubbing=true;document.body.style.userSelect='none';scrubTo(e);});
document.addEventListener('mousemove',(e)=>{if(scrubbing){e.preventDefault();scrubTo(e);}});
document.addEventListener('mouseup',()=>{scrubbing=false;document.body.style.userSelect='';});

// Arrow-key scrub (10s) — separate from chapter/slide nav, which stays on the Prev/Next buttons.
function scrubBy(sec){
  const dur=aud.duration||EPISODE_DURATION;
  const targetTime=Math.max(0,Math.min(dur,aud.currentTime+sec));
  aud.currentTime=targetTime;
  let target=0;
  for(let i=0;i<slides.length;i++){if(targetTime>=slides[i].time) target=i;}
  if(target!==cur){cur=target;render(cur);}
  updateProgressBar();
}

// ── PLAYBACK SPEED ──
// #bottom-box is only elevated above the progress bar (z-index 20) WHILE the
// menu is open — permanently raising it clips the progress dot, since
// bottom-box's opaque background overlaps the progress bar's vertical band.
function setSpeedMenuOpen(open){
  document.getElementById('speed-menu').classList.toggle('open',open);
  document.getElementById('bottom-box').style.zIndex=open?'25':'';
}
function toggleSpeedMenu(e){
  if(e) e.stopPropagation();
  setSpeedMenuOpen(!document.getElementById('speed-menu').classList.contains('open'));
}
function setSpeed(rate){
  aud.playbackRate=rate;
  document.getElementById('speed-btn').textContent=rate+'x ▾';
  setSpeedMenuOpen(false);
  document.querySelectorAll('.speed-opt').forEach(el=>{
    el.classList.toggle('active',parseFloat(el.dataset.rate)===rate);
  });
}
document.addEventListener('click',(e)=>{
  const wrap=document.getElementById('speed-wrap');
  if(!wrap.contains(e.target)) setSpeedMenuOpen(false);
});

// ── CHAPTER NAV ──
function skipNext(){
  if(cur<slides.length-1){
    cur++;
    aud.currentTime=slides[cur].time;
    render(cur);
  }
}
function skipPrev(){
  const slideStart=slides[cur].time;
  if(aud.currentTime-slideStart>3&&cur>0){
    // more than 3s into current slide: go back to start of current slide
    aud.currentTime=slideStart;
    updateProgressBar();
  } else if(cur>0){
    // within 3s of start: go to previous slide
    cur--;
    aud.currentTime=slides[cur].time;
    render(cur);
  } else {
    // first slide: restart
    aud.currentTime=0;
    updateProgressBar();
  }
}

// ── KEYBOARD ──
// Arrows scrub audio 10s (not chapter-skip — that's the Prev/Next buttons only).
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'){e.preventDefault();scrubBy(10);}
  if(e.key==='ArrowLeft'){e.preventDefault();scrubBy(-10);}
  if(e.key===' '){e.preventDefault();togglePlay();}
});

// ── ACTION BOX OVERFLOW TRIMMING ──
// Boxes are always authored cumulative (every street, oldest first — see
// PLO_LOCKED_SPEC.md §9). If that ever overflows the fixed, non-scrolling
// action-zone, trim folded (never all-in) players' lines out of the OLDEST
// history first, least-impactful player first, one player at a time, until
// it fits. This only ever fires when content actually overflows — normal
// slides are untouched.
function renderBoxesInto(container,boxes){
  container.innerHTML='';
  boxes.forEach(box=>{
    const d=document.createElement('div');d.className='ab';
    const lines=box.lines;
    if(lines.length>4){
      const mid=Math.ceil(lines.length/2);
      const left=lines.slice(0,mid),right=lines.slice(mid);
      let h=`<div class="sl">${box.street}</div><div class="cols"><div>`;
      left.forEach(l=>{const cls=l.hero?'hq':'pos';h+=`<div class="al"><span class="${cls}">${l.pos}:</span> <span class="act">${l.act}</span></div>`;});
      h+=`</div><div>`;
      right.forEach(l=>{const cls=l.hero?'hq':'pos';h+=`<div class="al"><span class="${cls}">${l.pos}:</span> <span class="act">${l.act}</span></div>`;});
      h+=`</div></div>`;
      d.innerHTML=h;
    } else {
      let h=`<div class="sl">${box.street}</div>`;
      lines.forEach(l=>{const cls=l.hero?'hq':'pos';h+=`<div class="al"><span class="${cls}">${l.pos}:</span> <span class="act">${l.act}</span></div>`;});
      d.innerHTML=h;
    }
    container.appendChild(d);
  });
}
const STREET_PRIORITY={'PRE-FLOP':0,'FLOP':1,'TURN':2,'RIVER':3,'SHOWDOWN':4};
function trimCandidates(boxes,players,slide){
  const candidates=[];
  Object.keys(players).forEach(key=>{
    if(key==='hero') return;
    const ps=players[key];
    if(!ps||!ps.folded||ps.allIn) return;
    const label=npLabel(key,SEATS[key],slide);
    let foldStreet=null,hadPriorAction=false;
    outer:
    for(let bi=0;bi<boxes.length;bi++){
      const lines=boxes[bi].lines;
      for(let li=0;li<lines.length;li++){
        if(lines[li].pos!==label) continue;
        if(/fold/i.test(lines[li].act)){ foldStreet=boxes[bi].street; break outer; }
        hadPriorAction=true;
      }
    }
    if(foldStreet===null) return; // no fold line on record — never trim without one
    const streetP=STREET_PRIORITY[foldStreet]!==undefined?STREET_PRIORITY[foldStreet]:99;
    const subP=(streetP===0&&!hadPriorAction)?0:1; // instant preflop fold ranks above a fold after acting
    candidates.push({label,priority:streetP*10+subP});
  });
  candidates.sort((a,b)=>a.priority-b.priority);
  return candidates.map(c=>c.label);
}
function trimPlayerFromBoxes(boxes,label){
  return boxes.map(box=>({street:box.street,lines:box.lines.filter(l=>l.pos!==label)}))
              .filter(box=>box.lines.length>0);
}

// ── RENDER ──
function showZones(type){
  document.getElementById('table-zone').style.display  =(type==='hand')?'flex':'none';
  document.getElementById('action-zone').style.display =(type==='hand')?'flex':'none';
  document.getElementById('concept-zone').style.display=(type==='concept'||type==='hand-concept')?'flex':'none';
  document.getElementById('title-zone').style.display  =(type==='title')?'flex':'none';
}

function render(idx){
  const slide=slides[idx];
  const total=slides.length;
  document.getElementById('snb').textContent=`${idx+1}/${total}`;
  document.getElementById('bt').innerHTML=slide.bottomText||'';

  const tbStakes=document.getElementById('tb-stakes'),tbStakesDot=document.getElementById('tb-stakes-dot');
  if(slide.type==='hand'){
    document.getElementById('tb-hand').textContent=slide.handLabel||'HAND 2';
    document.getElementById('tb-dec').textContent=slide.location||slide.shortLabel||slide.dec;
    tbStakes.textContent=slide.stakes||'$1/$2/$5 PLO';
    tbStakes.style.display='inline';
    tbStakesDot.style.display='inline';
  } else if(slide.type==='hand-concept'){
    document.getElementById('tb-hand').textContent='PLO BATTLE PLAN';
    document.getElementById('tb-dec').textContent=slide.location||slide.shortLabel||'EPISODE 6';
    tbStakes.style.display='none';
    tbStakesDot.style.display='none';
  } else {
    document.getElementById('tb-hand').textContent='PLO BATTLE PLAN';
    document.getElementById('tb-dec').textContent='EPISODE 6';
    tbStakes.style.display='none';
    tbStakesDot.style.display='none';
  }

  showZones(slide.type);

  if(slide.type==='title'){
    const tz=document.getElementById('title-zone');
    const subCls=slide.bigTakeaway?'subtitle big':'subtitle';
    tz.innerHTML=`<h1>${slide.heading}</h1>
<div class="${subCls}">${slide.subtitle||''}</div>
${slide.subtitle2?`<div class="${subCls}" style="margin-top:10px">${slide.subtitle2}</div>`:''}
<div class="host">${slide.host||''}</div>
${slide.bottomText?`<div class="subtitle" style="margin-top:8px;font-size:.85rem">${slide.bottomText}</div>`:''}`;
  }

  if(slide.type==='concept'){
    const cz=document.getElementById('concept-zone');
    let h=`<h2>${slide.heading}</h2><ul>`;
    slide.items.forEach(item=>{h+=`<li${item.sub?' class="sub"':''}>${item.text}</li>`;});
    h+=`</ul>`;
    if(slide.insight) h+=`<div class="insight-box">${slide.insight}</div>`;
    cz.innerHTML=h;
  }

  if(slide.type==='hand-concept'){
    const cz=document.getElementById('concept-zone');
    cz.innerHTML=`<h2>${slide.heading}</h2>${slide.content||''}${slide.insight?`<div class="insight-box">${slide.insight}</div>`:''}`;
  }

  if(slide.type==='hand'){
    const abc=document.getElementById('ab-container');
    const zone=document.getElementById('action-zone');
    let workingBoxes=slide.boxes;
    renderBoxesInto(abc,workingBoxes);
    if(abc.scrollHeight>zone.clientHeight){
      const candidates=trimCandidates(workingBoxes,slide.players,slide);
      for(const label of candidates){
        workingBoxes=trimPlayerFromBoxes(workingBoxes,label);
        renderBoxesInto(abc,workingBoxes);
        if(abc.scrollHeight<=zone.clientHeight) break;
      }
    }
    const order=['mp','utg2','utg1','lj','hj','co','btn','sb','hero'];
    document.getElementById('sl').innerHTML=order.map(k=>renderSeat(k,SEATS[k],slide.players[k],slide)).join('');
    document.getElementById('bl').innerHTML=boardRow(CX,CY-15,slide.board);
    const potChipY=CY+55;
    const swept=slide.potSwept||0;
    let potHTML=swept>0?drawPotChips(CX,potChipY,swept):'';
    if(slide.pots&&slide.pots.length>=2){
      const total=slide.pots.reduce((s,p)=>s+p.amount,0);
      const label=`Total Pot: $${total}`,w=Math.max(88,label.length*7+20);
      potHTML+=`<rect x="${CX-w/2}" y="${potChipY+16}" width="${w}" height="22" rx="11" fill="#111" opacity=".85"/>
<text x="${CX}" y="${potChipY+31}" text-anchor="middle" font-size="13" fill="#fff" font-weight="700" font-family="Arial">${label}</text>`;
      potHTML+=renderPotBadges(slide.pots);
    } else {
      potHTML+=`<rect x="${CX-44}" y="${potChipY+16}" width="88" height="22" rx="11" fill="#111" opacity=".85"/>
<text x="${CX}" y="${potChipY+31}" text-anchor="middle" font-size="13" fill="#fff" font-weight="700" font-family="Arial">Pot: $${slide.pot}</text>`;
    }
    document.getElementById('pl').innerHTML=potHTML;
    const _heroPos=slide.heroPos||SEATS.hero.heroPos||'BB';
    document.getElementById('btl').innerHTML=posBtns(
      findSlotAngle('BTN',_heroPos), findSlotAngle('SB',_heroPos), findSlotAngle('BB',_heroPos));
  }
}

render(0);
</script>
